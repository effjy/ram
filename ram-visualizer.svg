<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <!-- Background Circle Gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </radialGradient>
    
    <!-- RAM Board Gradient -->
    <linearGradient id="boardGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0284c7"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>

    <!-- Circuit Trace Glow -->
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
  </defs>

  <!-- 1. Squeezed circular slate backdrop -->
  <rect x="8" y="8" width="112" height="112" rx="28" fill="url(#bgGrad)" stroke="#334155" stroke-width="3"/>

  <!-- Glow circle in center -->
  <circle cx="64" cy="64" r="35" fill="#0ea5e9" opacity="0.12" filter="blur(6px)"/>

  <!-- 2. RAM Stick circuit board outline -->
  <rect x="20" y="44" width="88" height="34" rx="4" fill="url(#boardGrad)" stroke="#1e1b4b" stroke-width="2"/>

  <!-- 3. Connection Pin teeth at the bottom -->
  <g fill="#f59e0b">
    <rect x="26" y="74" width="3" height="4" rx="0.5"/>
    <rect x="32" y="74" width="3" height="4" rx="0.5"/>
    <rect x="38" y="74" width="3" height="4" rx="0.5"/>
    <rect x="44" y="74" width="3" height="4" rx="0.5"/>
    <rect x="50" y="74" width="3" height="4" rx="0.5"/>
    <rect x="56" y="74" width="3" height="4" rx="0.5"/>
    <!-- Key notch split -->
    <rect x="68" y="74" width="3" height="4" rx="0.5"/>
    <rect x="74" y="74" width="3" height="4" rx="0.5"/>
    <rect x="80" y="74" width="3" height="4" rx="0.5"/>
    <rect x="86" y="74" width="3" height="4" rx="0.5"/>
    <rect x="92" y="74" width="3" height="4" rx="0.5"/>
    <rect x="98" y="74" width="3" height="4" rx="0.5"/>
  </g>

  <!-- 4. Dynamic memory modular chips on the stick -->
  <g fill="#0f172a" stroke="#475569" stroke-width="1">
    <rect x="28" y="49" width="12" height="18" rx="1.5"/>
    <rect x="46" y="49" width="12" height="18" rx="1.5"/>
    <rect x="70" y="49" width="12" height="18" rx="1.5"/>
    <rect x="88" y="49" width="12" height="18" rx="1.5"/>
  </g>

  <!-- Little details on chips -->
  <line x1="34" y1="52" x2="34" y2="64" stroke="#334155" stroke-dasharray="2 2"/>
  <line x1="52" y1="52" x2="52" y2="64" stroke="#334155" stroke-dasharray="2 2"/>
  <line x1="76" y1="52" x2="76" y2="64" stroke="#334155" stroke-dasharray="2 2"/>
  <line x1="94" y1="52" x2="94" y2="64" stroke="#334155" stroke-dasharray="2 2"/>

  <!-- 5. Futuristic fiber circuit paths glowing -->
  <path d="M12,64 H20 M108,64 H100" stroke="url(#glowGrad)" stroke-width="2" stroke-linecap="round"/>
  <path d="M42,30 L55,44" fill="none" stroke="#22d3ee" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <path d="M86,98 L75,78" fill="none" stroke="#a78bfa" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>

  <!-- Glowing pulse nodes -->
  <circle cx="42" cy="30" r="2.5" fill="#22d3ee"/>
  <circle cx="86" cy="98" r="2.5" fill="#a78bfa"/>

  <!-- Speed lines depicting real-time scanning -->
  <rect x="35" y="24" width="58" height="2" fill="#38bdf8" opacity="0.4"/>
  <rect x="45" y="102" width="38" height="2" fill="#a78bfa" opacity="0.4"/>
</svg>
